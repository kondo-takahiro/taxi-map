<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>営業マップ | 高単価乗車地</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="key.js"></script>
<script>
// 地図回転プラグインはGoogleマップ表示と競合するため、Google表示時は読み込まない
if((localStorage.getItem("taxi-map-style")||"light") !== "google"){
  document.write('<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"><\/script>');
}
</script>
<script src="https://unpkg.com/leaflet.gridlayer.googlemutant@0.14.1/dist/Leaflet.GoogleMutant.js"></script>
<style>
  :root{
    --bg:#0d1320; --panel:#151d2e; --panel2:#1c2638; --line:#28344b;
    --text:#e9edf5; --muted:#8b96ab; --amber:#ffb53c; --amber-dim:#7a5a26;
    --low:#4a5a78; --danger:#ff6b5e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;}
  #map{position:fixed;inset:0;background:#f2efe9;}
  #map.dark-tiles{background:#0d1320;}
  #map.dark-tiles .leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(.85) contrast(.9) saturate(.6);}
  .me-dot{width:16px;height:16px;border-radius:50%;background:#1e88e5;border:3px solid #fff;
    box-shadow:0 0 8px rgba(30,136,229,.8);}
  .leaflet-container{font:inherit;}

  /* ヘッダー */
  header{position:fixed;top:0;left:0;right:0;z-index:1000;pointer-events:none;
    padding:10px 12px;display:flex;gap:8px;align-items:flex-start;}
  .brand{pointer-events:auto;background:rgba(13,19,32,.92);border:1px solid var(--line);
    border-radius:12px;padding:8px 14px;}
  .brand h1{margin:0;font-size:15px;letter-spacing:.08em;font-weight:700;}
  .brand h1 span{color:var(--amber);}
  .brand small{color:var(--muted);font-size:11px;}
  .stats{pointer-events:auto;margin-left:auto;display:flex;gap:6px;}
  .stat{background:rgba(13,19,32,.92);border:1px solid var(--line);border-radius:12px;
    padding:6px 12px;text-align:right;}
  .stat b{display:block;font-size:16px;font-variant-numeric:tabular-nums;color:var(--amber);line-height:1.2;}
  .stat small{color:var(--muted);font-size:10px;}

  /* 下部パネル */
  .panel{position:fixed;left:0;right:0;bottom:0;z-index:1000;
    background:rgba(19,26,42,.96);border-top:1px solid var(--line);
    border-radius:16px 16px 0 0;padding:0 14px calc(18px + env(safe-area-inset-bottom));
    }
  .panel-handle{display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:12px 0 10px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;}
  .panel-handle .grip{width:52px;height:5px;border-radius:3px;background:var(--muted);opacity:.7;}
  .panel-handle span{font-size:11px;color:var(--muted);}
  .panel-body{overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:min(55svh,450px);transition:max-height .25s ease;}
  .panel.collapsed .panel-body{max-height:0;overflow:hidden;}
  .panel.collapsed{padding-bottom:calc(4px + env(safe-area-inset-bottom));}
  .row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .row + .row{margin-top:10px;}
  .label{font-size:11px;color:var(--muted);min-width:52px;}

  .chip{border:1px solid var(--line);background:var(--panel2);color:var(--text);
    border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer;font-variant-numeric:tabular-nums;}
  .chip.on{background:var(--amber);border-color:var(--amber);color:#1a1206;font-weight:700;}

  /* 時間帯スライダー(乗務記録のタコチャート風) */
  .timeline{flex:1;min-width:200px;position:relative;height:44px;}
  .tl-track{position:absolute;left:0;right:0;top:18px;height:6px;border-radius:3px;background:var(--panel2);border:1px solid var(--line);}
  .tl-fill{position:absolute;top:18px;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--amber-dim),var(--amber));}
  .tl-ticks{position:absolute;left:0;right:0;top:8px;height:8px;}
  .tick{position:absolute;width:2px;height:8px;bottom:0;border-radius:1px;background:var(--low);}
  .tick.hit{background:var(--amber);}
  .tl-hours{position:absolute;left:0;right:0;top:30px;font-size:9px;color:var(--muted);}
  .tl-hours span{position:absolute;transform:translateX(-50%);}
  .timeline input[type=range]{position:absolute;left:0;right:0;top:12px;width:100%;margin:0;
    -webkit-appearance:none;appearance:none;background:transparent;pointer-events:none;height:18px;}
  .timeline input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;
    width:18px;height:18px;border-radius:50%;background:var(--text);border:3px solid var(--amber);cursor:grab;}
  .timeline input[type=range]::-moz-range-thumb{pointer-events:auto;width:12px;height:12px;border-radius:50%;
    background:var(--text);border:3px solid var(--amber);cursor:grab;}
  .tl-val{font-size:12px;color:var(--amber);font-variant-numeric:tabular-nums;min-width:96px;text-align:right;}

  .btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);
    border-radius:10px;padding:7px 12px;font-size:12px;cursor:pointer;}
  .btn.on{background:var(--amber);border-color:var(--amber);color:#1a1206;font-weight:700;}
  .btn.warn{color:var(--danger);border-color:var(--danger);}

  /* マーカー(行灯ピン) */
  .lamp{border-radius:50%;border:1px solid rgba(26,18,6,.5);
    box-shadow:0 0 4px rgba(255,181,60,.35);background:rgba(255,181,60,.55);}
  .lamp.low{background:rgba(74,90,120,.45);box-shadow:none;border-color:rgba(13,19,32,.4);}
  .lamp-label{position:absolute;top:-13px;left:50%;transform:translateX(-50%);
    font-size:9px;font-weight:700;color:rgba(255,181,60,.85);text-shadow:0 1px 2px rgba(0,0,0,.8);white-space:nowrap;
    font-variant-numeric:tabular-nums;}

  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border-radius:12px;border:1px solid var(--line);}
  .leaflet-popup-tip{background:var(--panel);}
  .pop b{color:var(--amber);font-size:16px;}
  .pop .navi{margin-top:10px;margin-right:6px;display:inline-block;background:var(--amber);color:#1a1206;font-weight:700;
    font-size:13px;text-decoration:none;border-radius:10px;padding:8px 12px;cursor:pointer;}
  .pop .navi.sub{background:transparent;color:var(--text);border:1px solid var(--line);font-weight:400;}
  .pop .del{margin-top:8px;display:inline-block;color:var(--danger);font-size:12px;cursor:pointer;border:1px solid var(--danger);border-radius:8px;padding:3px 8px;}

  /* 追加フォーム */
  .sheet{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.55);display:none;align-items:flex-end;}
  .sheet.open{display:flex;}
  .sheet form{width:100%;background:var(--panel);border-radius:16px 16px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom));}
  .sheet h2{margin:0 0 12px;font-size:15px;}
  .field{margin-bottom:10px;}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
  .field input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);padding:9px 10px;font-size:16px;}
  .sheet .actions{display:flex;gap:8px;margin-top:14px;}
  .sheet .actions .btn{flex:1;padding:11px;font-size:14px;}

  .hint{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:1500;
    background:var(--amber);color:#1a1206;font-size:12px;font-weight:700;border-radius:20px;padding:7px 14px;display:none;}
  .hint.show{display:block;}
  @media (max-width:480px){ .stats .stat:nth-child(3){display:none;} }
</style>
</head>
<body>
<div id="map"></div>

<header>
  <div class="stats">
    <div class="stat"><b id="stCount">0</b><small>該当件数</small></div>
    <div class="stat"><b id="stSum">¥0</b><small>合計営収</small></div>
    <div class="stat"><b id="stAvg">¥0</b><small>平均単価</small></div>
  </div>
</header>

<div id="routeInfo" style="display:none;position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:1200;
  align-items:center;gap:10px;background:rgba(19,26,42,.95);border:1px solid #42a5f5;border-radius:20px;padding:8px 14px;font-size:13px;color:var(--text);white-space:nowrap;">
  <span id="routeText">経路を計算中…</span>
  <span id="routeClose" style="cursor:pointer;color:var(--muted);font-weight:700;padding:0 2px;">✕</span>
</div>

<div id="zoomBtns" style="position:fixed;right:10px;top:45%;transform:translateY(-50%);z-index:900;display:flex;flex-direction:column;gap:8px;">
  <button id="zoomIn" style="width:46px;height:46px;border-radius:12px;border:1px solid var(--line);background:rgba(19,26,42,.92);color:var(--text);font-size:24px;font-weight:700;">＋</button>
  <button id="zoomOut" style="width:46px;height:46px;border-radius:12px;border:1px solid var(--line);background:rgba(19,26,42,.92);color:var(--text);font-size:24px;font-weight:700;">−</button>
</div>

<div id="rankPanel" style="display:none;position:fixed;top:calc(64px + env(safe-area-inset-top));left:10px;right:10px;z-index:1100;
  background:rgba(19,26,42,.96);border:1px solid var(--line);border-radius:14px;padding:12px 14px;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
    <b style="font-size:14px;">高単価の町丁目</b>
    <button class="btn" id="rankNow" style="padding:5px 10px;font-size:12px;">今の時間帯に絞る</button>
    <span style="flex:1"></span>
    <span id="rankClose" style="cursor:pointer;color:var(--muted);font-weight:700;font-size:16px;padding:0 4px;">✕</span>
  </div>
  <div id="rankList"></div>
  <div style="font-size:10px;color:var(--muted);margin-top:6px;">タップでその場所へジャンプ・運転中の注視は控えてください</div>
</div>

<div id="advicePanel" style="display:none;position:fixed;top:calc(64px + env(safe-area-inset-top));left:10px;right:10px;z-index:1100;
  background:rgba(19,26,42,.96);border:1px solid var(--amber);border-radius:14px;padding:12px 14px;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
    <b style="font-size:14px;">💡 いまの立ち回り</b>
    <span id="adviceTime" style="font-size:12px;color:var(--muted);"></span>
    <span style="flex:1"></span>
    <span id="adviceClose" style="cursor:pointer;color:var(--muted);font-weight:700;font-size:16px;padding:0 4px;">✕</span>
  </div>
  <div id="adviceList"></div>
  <div id="adviceAIText" style="display:none;margin-top:8px;padding:10px;background:var(--panel2);border-radius:10px;font-size:13px;line-height:1.65;"></div>
  <button class="btn" id="adviceAI" style="margin-top:8px;width:100%;padding:10px;">🤖 AIに立ち回りを相談</button>
  <div id="adviceNote" style="font-size:10px;color:var(--muted);margin-top:6px;"></div>
</div>

<div id="reviewPanel" style="display:none;position:fixed;top:calc(60px + env(safe-area-inset-top));left:10px;right:10px;bottom:90px;z-index:1100;
  background:rgba(19,26,42,.97);border:1px solid var(--line);border-radius:14px;padding:12px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
    <b style="font-size:14px;">📊 実績の振り返り</b>
    <span style="flex:1"></span>
    <span id="reviewClose" style="cursor:pointer;color:var(--muted);font-weight:700;font-size:16px;padding:0 4px;">✕</span>
  </div>
  <div id="reviewBody"></div>
</div>

<div class="hint" id="hint">地図をタップして乗車地点を選択</div>

<div id="heatLegend" style="display:none;position:fixed;top:calc(10px + env(safe-area-inset-top));left:10px;z-index:900;align-items:center;gap:5px;
  background:rgba(19,26,42,.85);border:1px solid var(--line);border-radius:8px;padding:4px 8px;font-size:9px;color:var(--muted);">
  <span>低</span>
  <span style="width:52px;height:6px;border-radius:3px;background:linear-gradient(90deg,#81c784,#aed581,#fdd835,#fb8c00,#e53935,#b71c1c);"></span>
  <span>高</span>
  <span style="font-size:8px;opacity:.6;">境界:国勢調査</span>
</div>

<div id="tileWarn" style="display:none;position:fixed;top:70px;left:12px;right:12px;z-index:1500;
  background:#2a1e12;border:1px solid var(--amber);border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.6;">
  <b style="color:var(--amber)">背景地図を読み込めません</b><br>
  この画面(アプリ内プレビュー)では外部の地図データがブロックされている可能性があります。
  ファイルをダウンロードし、<b>SafariやChromeなどのブラウザで直接開いて</b>ください。ネット接続も必要です。
</div>

<div class="panel" id="panel">
  <div class="panel-handle" id="panelHandle">
    <div class="grip"></div>
    <span id="handleText">フィルターを閉じる ▼</span>
    <span id="verTag" style="font-size:10px;opacity:.75;color:var(--amber);"></span>
  </div>
  <div class="panel-body" id="panelBody">
  <div class="row">
    <span class="label">単価</span>
    <button class="chip on" data-min="0">全て</button>
    <button class="chip" data-min="3000">¥3,000+</button>
    <button class="chip" data-min="5000">¥5,000+</button>
    <button class="chip" data-min="8000">¥8,000+</button>
    <span style="flex:1"></span>
    <button class="btn" id="btnAdvice">💡 立ち回り</button>
    <button class="btn" id="btnReview">📊 振り返り</button>
    <button class="btn" id="btnRank">🏆 ランキング</button>
    <button class="btn" id="btnHead">⬆️ 北固定</button>
    <button class="btn" id="btnStyle">🌙 夜間配色</button>
    <button class="btn" id="btnHeat">ヒート</button>
    <button class="btn" id="btnGps">現在地</button>
  </div>
  <div class="row">
    <span class="label">曜日</span>
    <button class="chip dow on" data-dow="all">全て</button>
    <button class="chip dow" data-dow="1">月</button>
    <button class="chip dow" data-dow="2">火</button>
    <button class="chip dow" data-dow="3">水</button>
    <button class="chip dow" data-dow="4">木</button>
    <button class="chip dow" data-dow="5">金</button>
    <button class="chip dow" data-dow="6">土</button>
    <button class="chip dow" data-dow="0">日</button>
    <span style="flex:1"></span>
    <button class="chip mode on" data-mode="all">全て</button>
    <button class="chip mode" data-mode="app">アプリ</button>
    <button class="chip mode" data-mode="st">流し</button>
    <button class="chip wx on" data-wx="all">全天候</button>
    <button class="chip wx" data-wx="rain">☔雨</button>
    <button class="chip wx" data-wx="dry">☀晴</button>
  </div>
  <div class="row">
    <span class="label">時間帯</span>
    <div class="timeline" id="timeline">
      <div class="tl-track"></div>
      <div class="tl-fill" id="tlFill"></div>
      <div class="tl-ticks" id="tlTicks"></div>
      <div class="tl-hours" id="tlHours"></div>
      <input type="range" id="tMin" min="5" max="29" value="5" step="1">
      <input type="range" id="tMax" min="5" max="29" value="29" step="1">
    </div>
    <span class="tl-val" id="tlVal">5:00 – 5:00</span>
  </div>
  <div class="row">
    <button class="btn" id="btnAdd">＋ 乗車を記録</button>
    <button class="btn" id="btnCsvOut">CSV書き出し</button>
    <button class="btn" id="btnPaste">貼り付け読み込み</button>
    <button class="btn" id="btnCsvIn">ファイル読み込み</button>
    <button class="btn" id="btnSync">共有データ再読み込み</button>
    <input type="file" id="fileCsv" accept=".csv,.txt" style="display:none">
    <span style="flex:1"></span>
    <button class="btn warn" id="btnReset">初期化</button>
  </div>
  </div><!-- /panel-body -->
</div>

<div class="sheet" id="pasteSheet">
  <form id="pasteForm">
    <h2>テキストを貼り付けて読み込み</h2>
    <div class="field">
      <label>CSV形式(date,time,pickup,lat,lng,fare,dropoff,mode)。タブ区切りも可。ヘッダー行はあってもなくてもOK</label>
      <textarea id="pasteText" rows="7" placeholder="2026-07-15,21:35,港区六本木7,35.6631,139.7297,6800,世田谷区成城6,app&#10;2026-07-15,23:10,中央区銀座5,35.6704,139.7650,3200,,st"
        style="width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:9px 10px;font-size:14px;font-family:ui-monospace,monospace;"></textarea>
    </div>
    <div class="actions">
      <button type="button" class="btn" id="btnPasteCancel">キャンセル</button>
      <button type="submit" class="btn on">読み込む</button>
    </div>
  </form>
</div>

<div class="sheet" id="sheet">
  <form id="rideForm">
    <h2>乗車を記録</h2>
    <div class="field"><label>日付</label><input type="date" id="fDate" required></div>
    <div class="field"><label>乗車時刻</label><input type="time" id="fTime" required></div>
    <div class="field"><label>乗車地(例:港区六本木5)</label><input type="text" id="fPlace" required placeholder="地名・交差点名など"></div>
    <div class="field"><label>料金(円)</label><input type="number" id="fFare" required min="0" step="10" placeholder="6300"></div>
    <div class="field"><label>配車区分</label>
      <div style="display:flex;gap:8px">
        <button type="button" class="btn on" id="mApp" style="flex:1">アプリ配車</button>
        <button type="button" class="btn" id="mSt" style="flex:1">流し</button>
      </div>
    </div>
    <div class="field"><label>降車地(任意)</label><input type="text" id="fDest" placeholder="渋谷区円山町"></div>
    <div class="actions">
      <button type="button" class="btn" id="btnCancel">キャンセル</button>
      <button type="submit" class="btn on">保存</button>
    </div>
  </form>
</div>

<script>

let TILE_SOURCES = TILE_STYLES[mapStyle==="google" ? "light" : mapStyle];
let tileIdx = 0, tileErrors = 0, currentTiles = null, googleLayer = null, gWait = 0;
function mountTiles(){
  if(currentTiles){ map.removeLayer(currentTiles); currentTiles=null; }
  if(googleLayer){ map.removeLayer(googleLayer); googleLayer=null; }
  document.getElementById("map").classList.toggle("dark-tiles", mapStyle==="dark");
  if(mapStyle==="google"){
    if(!(window.google && window.google.maps && L.gridLayer.googleMutant)){
      // Google Maps APIの読み込み待ち(最大約9秒)
      if(gWait++ < 30){ setTimeout(mountTiles, 300); return; }
      gWait=0; alert("Googleマップを読み込めませんでした。APIキーの設定を確認してください。従来の地図で表示します。");
      mapStyle="light"; localStorage.setItem("taxi-map-style","light"); styleLabel();
    }else{
      gWait=0;
      googleLayer = L.gridLayer.googleMutant({type:"roadmap", maxZoom:20});
      googleLayer.addTo(map);
      document.getElementById("tileWarn").style.display = "none";
      return;
    }
  }
  tileErrors = 0;
  TILE_SOURCES = TILE_STYLES[mapStyle];
  const src = TILE_SOURCES[tileIdx];
  currentTiles = L.tileLayer(src.url,{maxZoom:18, attribution:src.attr, updateWhenIdle:true, keepBuffer:3});
  currentTiles.on("tileerror", ()=>{
    tileErrors++;
    if(tileErrors >= 4){
      if(tileIdx < TILE_SOURCES.length-1){ tileIdx++; mountTiles(); }
      else{ document.getElementById("tileWarn").style.display = "block"; }
    }
  });
  currentTiles.on("load", ()=>{ document.getElementById("tileWarn").style.display = "none"; });
  currentTiles.addTo(map);
}

// 平均単価→色(緑=低 → 黄 → 橙 → 赤=高)
function fareTierColor(avg){
  if(avg>=8000) return "#b71c1c";
  if(avg>=5000) return "#e53935";
  if(avg>=3000) return "#fb8c00";
  if(avg>=2000) return "#fdd835";
  if(avg>=1000) return "#aed581";
  return "#81c784"; // ¥1,000未満・データなし
}

// 町丁目境界(chome.json)と区市境界(wards.json)はヒートマップ初回オン時に裏で読み込む
// バージョンが変わると新しいファイルを取り直す(同バージョン内はキャッシュで高速)
let chomeIndex=null, chomeLoading=false, wardsData=null;
function ensureChome(){
  if(chomeIndex || chomeLoading) return;
  chomeLoading=true;
  Promise.all([
    fetch("chome.json?v="+APP_VER).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch("wards.json?v="+APP_VER).then(r=>r.ok?r.json():null).catch(()=>null)
  ]).then(([gj,wj])=>{
    if(gj) chomeIndex=new Map(gj.features.map(f=>[f.properties.n, f]));
    if(wj) wardsData=wj;
    if(gj||wj) render(); // 読み込み完了後に表示を差し替え
  }).finally(()=>{ chomeLoading=false; });
}

function drawHeat(list){
  if(heatLayer){ map.removeLayer(heatLayer); heatLayer=null; }
  document.getElementById("heatLegend").style.display = heatOn ? "flex" : "none";
  if(!heatOn) return;
  ensureChome();
  heatLayer=L.layerGroup();
  // 背景地図の色味を抑える白いベール(道路や公園の色と混ざるのを防ぐ)
  const b=map.getBounds().pad(0.5);
  L.rectangle(b,{renderer:heatRenderer, stroke:false,
    fillColor:"#ffffff", fillOpacity:0.5, interactive:false}).addTo(heatLayer);
  // 町丁目(乗車地名)ごとに集計
  const SIZE=0.0025;
  const byAddr=new Map();
  list.forEach(r=>{
    const a=byAddr.get(r.p)||{sum:0,n:0,latS:0,lngS:0};
    a.sum+=r.f; a.n++; a.latS+=r.lat; a.lngS+=r.lng;
    byAddr.set(r.p,a);
  });
  byAddr.forEach((a,name)=>{
    const avg=a.sum/a.n;
    const col=fareTierColor(avg);
    const tip=`${name}<br>平均 ${yen(Math.round(avg))} / ${a.n}件`;
    const f=chomeIndex ? chomeIndex.get(name) : null;
    if(f){
      // 町丁目の実際の形で塗る
      L.geoJSON(f,{renderer:heatRenderer,
        style:{color:"#ffffff",weight:1.2,opacity:.9,fillColor:col,fillOpacity:.78}})
        .bindTooltip(tip,{direction:"top",sticky:true}).addTo(heatLayer);
    }else{
      // 境界未収録の住所や読み込み前はマス目で表示
      const la=Math.floor((a.latS/a.n)/SIZE)*SIZE, lo=Math.floor((a.lngS/a.n)/SIZE)*SIZE;
      L.rectangle([[la,lo],[la+SIZE,lo+SIZE]],{renderer:heatRenderer,
        color:"#ffffff",weight:1.2,opacity:.9,fillColor:col,fillOpacity:.78})
        .bindTooltip(tip,{direction:"top",sticky:true}).addTo(heatLayer);
    }
  });
  // 23区+武蔵野市+三鷹市の境界線を重ねる(薄めの点線)
  if(wardsData){
    L.geoJSON(wardsData,{renderer:heatRenderer, interactive:false,
      style:{color:"#4a5a75", weight:1.3, opacity:.55, dashArray:"6 6", fill:false}}).addTo(heatLayer);
  }
  heatLayer.addTo(map);
}

const shiftHour = t => { const h = parseInt(t.split(":")[0],10); return h < 5 ? h+24 : h; };
const yen = n => "¥" + n.toLocaleString("ja-JP");

// 営業日ベースの曜日(朝5時までの乗車は前日のシフト扱い)
function shiftDow(r){
  const dt = new Date(r.d + "T" + (r.t||"12:00") + ":00");
  if(isNaN(dt)) return -1;
  dt.setHours(dt.getHours() - 5);
  return dt.getDay();
}

let dowSet = new Set();      // 空 = 全曜日
let modeFilter = "all";      // all / app / st
let weatherFilter = "all";   // all / rain / dry
let rainMap = null;          // 営業日→降水量mm(初回利用時に取得)
try{ rainMap = JSON.parse(localStorage.getItem("wx-v1")) || null; }catch(e){}

// 営業日の文字列(朝5時までは前日扱い)
function shiftDateStr(r){
  const dt = new Date(r.d + "T" + (r.t||"12:00") + ":00");
  if(isNaN(dt)) return r.d;
  dt.setHours(dt.getHours() - 5);
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}
function wxOf(r){ // rain / dry / null(不明)
  if(!rainMap) return null;
  const mm = rainMap[shiftDateStr(r)];
  if(mm==null) return null;
  return mm >= 1 ? "rain" : "dry";
}

const MY_NAME = localStorage.getItem("my-name") || "近藤貴大";
// 名前が空欄または自分の名前の記録=自分の記録(他人の名前が付いた記録だけを除外)
function myRides(){ return rides.filter(r => !r.drv || r.drv === MY_NAME); }

function filtered(){
  return rides.filter(r =>
    r.f >= minFare &&
    shiftHour(r.t) >= tMin && shiftHour(r.t) <= tMax &&
    (dowSet.size === 0 || dowSet.has(shiftDow(r))) &&
    (modeFilter === "all" || (r.m || "app") === modeFilter) &&
    (weatherFilter === "all" || wxOf(r) === weatherFilter)
  );
}

function lampIcon(f){
  const size = Math.max(8, Math.min(22, 6 + Math.sqrt(f)/9));
  const cls = f >= minFare && f >= 5000 ? "lamp" : "lamp low";
  const label = f >= 5000 ? `<div class="lamp-label">${yen(f)}</div>` : "";
  return L.divIcon({className:"", iconSize:[size,size], iconAnchor:[size/2,size/2],
    html:`<div class="${cls}" style="width:${size}px;height:${size}px;position:relative">${label}</div>`});
}

let routeLayer=null;

function showRoute(dlat,dlng){
  if(!navigator.geolocation) return alert("この端末では位置情報を取得できません");
  const info=document.getElementById("routeInfo");
  info.style.display="flex";
  document.getElementById("routeText").textContent="経路を計算中…";
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const olat=pos.coords.latitude, olng=pos.coords.longitude;
      const url=`https://router.project-osrm.org/route/v1/driving/${olng},${olat};${dlng},${dlat}?overview=full&geometries=geojson`;
      const res=await fetch(url);
      const j=await res.json();
      if(j.code!=="Ok" || !j.routes || !j.routes[0]) throw new Error("経路が見つかりませんでした");
      const rt=j.routes[0];
      if(routeLayer) map.removeLayer(routeLayer);
      const line=rt.geometry.coordinates.map(c=>[c[1],c[0]]);
      routeLayer=L.layerGroup([
        L.polyline(line,{color:"#1e88e5",weight:7,opacity:.45}),
        L.polyline(line,{color:"#42a5f5",weight:3,opacity:.95}),
        L.circleMarker([olat,olng],{radius:6,color:"#fff",weight:2,fillColor:"#1e88e5",fillOpacity:1}),
        L.circleMarker([dlat,dlng],{radius:7,color:"#fff",weight:2,fillColor:"#ffb53c",fillOpacity:1})
      ]).addTo(map);
      map.fitBounds(L.latLngBounds(line),{padding:[50,50]});
      const km=(rt.distance/1000).toFixed(1);
      const min=Math.round(rt.duration/60);
      document.getElementById("routeText").textContent=`約${km}km・約${min}分(渋滞考慮なし)`;
    }catch(err){
      clearRoute();
      alert("経路を取得できませんでした。電波状況を確認してもう一度お試しください。\n("+err.message+")");
    }
  },()=>{
    clearRoute();
    alert("現在地を取得できませんでした。位置情報の許可を確認してください。");
  },{enableHighAccuracy:true, timeout:12000, maximumAge:10000});
}

// ===== 立ち回りアドバイス(現在地×現在時刻×全期間の実績から算出) =====
function haversineKm(a,b){
  const R=6371, d=Math.PI/180;
  const dLat=(b[0]-a[0])*d, dLng=(b[1]-a[1])*d;
  const s=Math.sin(dLat/2)**2 + Math.cos(a[0]*d)*Math.cos(b[0]*d)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function bearingText(a,b){
  const d=Math.PI/180;
  const y=Math.sin((b[1]-a[1])*d)*Math.cos(b[0]*d);
  const x=Math.cos(a[0]*d)*Math.sin(b[0]*d)-Math.sin(a[0]*d)*Math.cos(b[0]*d)*Math.cos((b[1]-a[1])*d);
  const deg=(Math.atan2(y,x)*180/Math.PI+360)%360;
  return ["北","北東","東","南東","南","南西","西","北西"][Math.round(deg/45)%8];
}
function buildAdvice(cur){
  const now=new Date();
  const h=now.getHours()+now.getMinutes()/60;
  const sh=h<5?h+24:h;
  // 現在時刻の前後の実績を集計(件数が少なければ範囲を広げる)
  let win=2, pool=[];
  for(; win<=5; win+=1.5){
    pool=rides.filter(r=>Math.abs(shiftHour(r.t)+parseInt(r.t.split(":")[1],10)/60-sh)<=win);
    const uniq=new Set(pool.map(r=>r.p));
    if(uniq.size>=5) break;
  }
  const byAddr=new Map();
  pool.forEach(r=>{
    const a=byAddr.get(r.p)||{sum:0,n:0,latS:0,lngS:0,st:0,dsts:{}};
    a.sum+=r.f; a.n++; a.latS+=r.lat; a.lngS+=r.lng;
    if((r.m||"app")==="st") a.st++;
    if(r.dst){ const d=r.dst.replace(/\d+$/,""); a.dsts[d]=(a.dsts[d]||0)+1; }
    byAddr.set(r.p,a);
  });
  const cands=[...byAddr.entries()].map(([p,a])=>{
    const ll=[a.latS/a.n, a.lngS/a.n];
    const dist=haversineKm(cur,ll);
    const avg=a.sum/a.n;
    // 単価が高く、実績が多く、近いほど高スコア
    const score=avg*Math.log2(1+a.n)/(1+dist/2.5);
    const topDest=Object.entries(a.dsts).sort((x,y)=>y[1]-x[1])[0];
    return {p, avg, n:a.n, ll, dist, score, st:a.st, topDest: topDest?topDest[0]:null};
  }).filter(c=>c.dist<=12)
    .sort((x,y)=>y.score-x.score)
    .slice(0,3);
  return {cands, win, sh};
}
function showAdvice(cur){
  const {cands,win,sh}=buildAdvice(cur);
  lastAdvice={cands,win,sh,cur};
  const ai=document.getElementById("adviceAIText"); ai.style.display="none"; ai.textContent="";
  const panel=document.getElementById("advicePanel");
  const now=new Date();
  document.getElementById("adviceTime").textContent=
    now.getHours()+":"+String(now.getMinutes()).padStart(2,"0")+"・現在地から";
  const el=document.getElementById("adviceList");
  if(!cands.length){
    el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0;">この時間帯・この周辺の実績がまだありません。データが溜まると提案できるようになります。</div>';
  }else{

// ===== AIによる立ち回り解説(OpenAI / Anthropic 両対応・キーは端末内のみに保存) =====
let lastAdvice=null; // showAdviceで更新
function getAIKey(){
  let k=localStorage.getItem("ai-api-key") || localStorage.getItem("claude-api-key");
  if(!k){
    alert("AI相談にはAPIキーが必要です。\nOpenAI(platform.openai.com)または Anthropic(console.anthropic.com)のキーに対応しています。\nキーはこのiPhoneの中だけに保存されます(GitHubには置かないでください)。");
    k=prompt("APIキー(sk-... または sk-ant-...)を貼り付け:");
    if(k){ k=k.trim(); localStorage.setItem("ai-api-key", k); }
  }
  return k;
}
function clearAIKey(){ localStorage.removeItem("ai-api-key"); localStorage.removeItem("claude-api-key"); }
async function callAI(key, prompt_){
  if(key.startsWith("sk-ant-")){
    // Anthropic (Claude)
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"content-type":"application/json","x-api-key":key,
        "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:400,
        messages:[{role:"user",content:prompt_}]})
    });
    if(res.status===401) return {auth:false};
    const data=await res.json();
    if(data.error) return {auth:true, text:null, err:data.error.message};
    return {auth:true, text:(data.content||[]).map(c=>c.type==="text"?c.text:"").join("").trim()};
  }else{
    // OpenAI (ChatGPT)
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{"content-type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model:"gpt-4o-mini",max_completion_tokens:400,
        messages:[{role:"user",content:prompt_}]})
    });
    if(res.status===401) return {auth:false};
    const data=await res.json();
    if(data.error) return {auth:true, text:null, err:data.error.message};
    return {auth:true, text:(data.choices?.[0]?.message?.content||"").trim()};
  }
}
async function askAI(){
  if(!lastAdvice) return;
  const key=getAIKey();
  if(!key) return;
  const out=document.getElementById("adviceAIText");
  out.style.display="block"; out.textContent="AIが分析中…";
  const now=new Date();
  const dow=["日","月","火","水","木","金","土"][now.getDay()];
  const ctx={
    現在時刻: now.getHours()+":"+String(now.getMinutes()).padStart(2,"0"),
    曜日: dow+"曜",
    候補: lastAdvice.cands.map(c=>({
      場所:c.p, 方角:bearingText(lastAdvice.cur,c.ll), 距離km:+c.dist.toFixed(1),
      平均単価:Math.round(c.avg), 実績件数:c.n, 流し比率:Math.round(c.st/c.n*100)+"%",
      多い降車先:c.topDest||"不明"
    }))
  };
  const prompt_=`あなたは東京のタクシー乗務員を支える立ち回りアドバイザーです。以下は乗務員本人の過去実績から算出した現在の狙い目候補です。時刻・曜日・距離・降車先の傾向を踏まえ、次の1時間の立ち回りを日本語3〜4文で簡潔に助言してください。実績件数が少ない候補は断定を避けてください。前置きは不要です。\n${JSON.stringify(ctx,null,1)}`;
  try{
    const r=await callAI(key, prompt_);
    if(!r.auth){
      clearAIKey();
      out.textContent="APIキーが無効でした。もう一度ボタンを押して正しいキーを入力してください。";
      return;
    }
    if(r.err){ out.textContent="エラー: "+r.err; return; }
    out.textContent=r.text||"回答を取得できませんでした。";
  }catch(err){
    out.textContent="通信エラーです。電波状況を確認してください。("+err.message+")";
  }
}

function barRow(label, value, max, fmt){
  const w = max>0 ? Math.round(value/max*100) : 0;
  return `<div style="display:flex;align-items:center;gap:8px;margin:4px 0;">
    <span style="width:72px;font-size:12px;color:var(--muted);flex-shrink:0;">${label}</span>
    <div style="flex:1;background:var(--panel2);border-radius:5px;height:18px;position:relative;overflow:hidden;">
      <div style="width:${w}%;height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));border-radius:5px;"></div>
    </div>
    <span style="width:78px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums;flex-shrink:0;">${fmt}</span>
  </div>`;
}
function sectionTitle(t){ return `<div style="font-size:13px;font-weight:700;margin:14px 0 6px;color:var(--amber);">${t}</div>`; }

function renderReview(){
  const body=document.getElementById("reviewBody");
  const mine=myRides();
  if(!mine.length){ body.innerHTML="データがありません"; return; }
  let html=`<div style="font-size:11px;color:var(--muted);margin-bottom:2px;">${MY_NAME}さんの記録のみ(${mine.length}件/全${rides.length}件)</div>`;

  // 月別営収
  const byMonth=new Map();
  mine.forEach(r=>{
    const m=shiftDateStr(r).slice(0,7);
    const a=byMonth.get(m)||{sum:0,days:new Set()};
    a.sum+=r.f; a.days.add(shiftDateStr(r)); byMonth.set(m,a);
  });
  const months=[...byMonth.entries()].sort();
  const mMax=Math.max(...months.map(([,a])=>a.sum));
  html+=sectionTitle("月別の営収");
  months.forEach(([m,a])=>{
    html+=barRow(m.slice(5)+"月", a.sum, mMax, yen(a.sum)+`<br><span style="color:var(--muted)">${a.days.size}日`+`・日平均`+yen(Math.round(a.sum/a.days.size))+`</span>`);
  });

  // 曜日別(営業日あたりの平均営収)
  const byDow=new Map();
  mine.forEach(r=>{
    const dw=shiftDow(r);
    const a=byDow.get(dw)||{sum:0,days:new Set()};
    a.sum+=r.f; a.days.add(shiftDateStr(r)); byDow.set(dw,a);
  });
  const dowNames=["日","月","火","水","木","金","土"];
  const dowAvg=[1,2,3,4,5,6,0].filter(d=>byDow.has(d))
    .map(d=>({d, avg:byDow.get(d).sum/byDow.get(d).days.size, days:byDow.get(d).days.size}));
  const dMax=Math.max(...dowAvg.map(x=>x.avg));
  html+=sectionTitle("曜日別・1営業日あたりの平均営収");
  dowAvg.forEach(x=>{
    html+=barRow(dowNames[x.d]+"曜", x.avg, dMax, yen(Math.round(x.avg))+`<br><span style="color:var(--muted)">${x.days}日分</span>`);
  });

  // 時間帯別営収(朝・昼・夜・深夜の4区分・1営業日あたりの平均)
  const totalDays=new Set(mine.map(r=>shiftDateStr(r))).size;
  const bands=[[5,13,"朝 5-13時"],[13,18,"昼 13-18時"],[18,22,"夜 18-22時"],[22,29,"深夜 22-5時"]];
  const bandAvg=bands.map(([a,b])=>mine.filter(r=>shiftHour(r.t)>=a&&shiftHour(r.t)<b).reduce((s,r)=>s+r.f,0)/(totalDays||1));
  const bMax=Math.max(...bandAvg);
  html+=sectionTitle("時間帯別・1営業日あたりの平均営収");
  bands.forEach(([a,b,label],i)=>{
    html+=barRow(label, bandAvg[i], bMax, yen(Math.round(bandAvg[i])));
  });

  // アプリ/流し
  const nApp=mine.filter(r=>(r.m||"app")==="app").length, nSt=mine.length-nApp;
  html+=sectionTitle("配車の内訳");
  html+=barRow("アプリ", nApp, mine.length, nApp+"回("+Math.round(nApp/mine.length*100)+"%)");
  html+=barRow("流し", nSt, mine.length, nSt+"回("+Math.round(nSt/mine.length*100)+"%)");

  // 時間効率の良い乗車地(乗車間隔から推定)
  const sorted=[...mine].sort((a,b)=>(a.d+a.t).localeCompare(b.d+b.t));
  const eff=new Map();
  for(let i=0;i<sorted.length-1;i++){
    const cur=sorted[i], nxt=sorted[i+1];
    if(shiftDateStr(cur)!==shiftDateStr(nxt)) continue;
    const gap=(new Date(nxt.d+"T"+nxt.t)-new Date(cur.d+"T"+cur.t))/60000; // 分
    if(gap<=0 || gap>120) continue; // 休憩などを除外
    const a=eff.get(cur.p)||{fare:0,min:0,n:0};
    a.fare+=cur.f; a.min+=gap; a.n++; eff.set(cur.p,a);
  }
  const effRows=[...eff.entries()].filter(([,a])=>a.n>=3)
    .map(([p,a])=>({p, perH:a.fare/(a.min/60), avgGap:a.min/a.n, n:a.n}))
    .sort((x,y)=>y.perH-x.perH).slice(0,5);
  if(effRows.length){
    const eMax=effRows[0].perH;
    html+=sectionTitle("時間効率の良い乗車地(推定¥/時)");
    effRows.forEach(x=>{
      html+=barRow(x.p.length>7?x.p.slice(0,7)+"…":x.p, x.perH, eMax,
        yen(Math.round(x.perH))+`/時<br><span style="color:var(--muted)">間隔${Math.round(x.avgGap)}分・${x.n}回</span>`);
    });
    html+=`<div style="font-size:10px;color:var(--muted);margin-top:4px;">※次の乗車までの間隔(実車時間込み)からの概算です</div>`;
  }

  // 雨の日と晴れの日(天気データ取得済みの場合)
  if(rainMap){
    const dayStat=new Map();
    mine.forEach(r=>{
      const d=shiftDateStr(r);
      const a=dayStat.get(d)||{sum:0};
      a.sum+=r.f; dayStat.set(d,a);
    });
    let rSum=0,rN=0,dSum=0,dN=0;
    dayStat.forEach((a,d)=>{
      const mm=rainMap[d];
      if(mm==null) return;
      if(mm>=1){ rSum+=a.sum; rN++; } else { dSum+=a.sum; dN++; }
    });
    if(rN&&dN){
      const wMax=Math.max(rSum/rN,dSum/dN);
      html+=sectionTitle("雨の日と晴れの日(1営業日あたり平均営収)");
      html+=barRow("☔ 雨", rSum/rN, wMax, yen(Math.round(rSum/rN))+`<br><span style="color:var(--muted)">${rN}日分</span>`);
      html+=barRow("☀ 晴", dSum/dN, wMax, yen(Math.round(dSum/dN))+`<br><span style="color:var(--muted)">${dN}日分</span>`);
    }
  }else{
    html+=`<div style="font-size:11px;color:var(--muted);margin-top:12px;">☔ フィルターの「雨/晴」を一度タップすると、天気別の分析もここに表示されます</div>`;
  }

  body.innerHTML=html;
}

btnGps.onclick=()=>{
  if(!navigator.geolocation) return alert("この端末では位置情報を取得できません");
  if(watchId!==null && !follow){ // ドラッグで一時解除中 → センターに戻して追尾再開
    follow=true; btnGps.textContent="追尾中";
    if(lastLL) map.setView(lastLL, map.getZoom(), {animate:true});
    return;
  }
  if(watchId!==null){ // 追尾を停止
    navigator.geolocation.clearWatch(watchId); watchId=null; follow=false;
    if(meMarker){meMarker.remove();meMarker=null;} if(meCircle){meCircle.remove();meCircle=null;}
    if(map.setBearing) map.setBearing(0);
    btnGps.classList.remove("on"); btnGps.textContent="現在地"; return;
  }
  firstFix=true; follow=true; btnGps.classList.add("on"); btnGps.textContent="追尾中";
  watchId=navigator.geolocation.watchPosition(pos=>{
    const ll=[pos.coords.latitude,pos.coords.longitude];
    lastLL=ll;
    if(!meMarker){
      meMarker=L.marker(ll,{icon:L.divIcon({className:"",iconSize:[16,16],iconAnchor:[8,8],
        html:'<div class="me-dot"></div>'}), zIndexOffset:1000}).addTo(map);
      meCircle=L.circle(ll,{radius:pos.coords.accuracy||30,color:"#1e88e5",weight:1,fillOpacity:.12}).addTo(map);
    }else{
      meMarker.setLatLng(ll); meCircle.setLatLng(ll); meCircle.setRadius(pos.coords.accuracy||30);
    }
    // 進行方向を上に(移動中のみGPSから方位が取れる)
    if(headingUp && map.setBearing && pos.coords.heading!=null && !isNaN(pos.coords.heading)){
      map.setBearing(-pos.coords.heading);
    }
    if(firstFix){ map.setView(ll,15); firstFix=false; }
    else if(follow){ map.setView(ll, map.getZoom(), {animate:false}); } // 常に自分が中心
  },err=>{
    if(!gpsSilent) alert("位置情報を取得できませんでした。iPhoneの設定→プライバシーとセキュリティ→位置情報サービスで、Safari(またはホーム画面に追加したアプリ)への許可を確認してください。");
    gpsSilent=false;
    navigator.geolocation.clearWatch(watchId); watchId=null; follow=false;
    btnGps.classList.remove("on"); btnGps.textContent="現在地";
  },{enableHighAccuracy:true, maximumAge:3000, timeout:15000});
};

// 地図を手で動かしたらセンター追尾を一時解除(記録は継続)
map.on("dragstart",()=>{
  if(watchId!==null && follow){ follow=false; btnGps.textContent="再センター"; }
});

// 北固定 ⇔ 進行方向の切り替え
btnHead.onclick=()=>{
  headingUp=!headingUp;
  btnHead.classList.toggle("on",headingUp);
  btnHead.textContent = headingUp ? "🧭 進行方向" : "⬆️ 北固定";
  if(!headingUp && map.setBearing) map.setBearing(0); // 北固定に戻す
};

// ズームボタン(中心=自分の位置を保ったまま拡大縮小)
document.getElementById("zoomIn").onclick=()=>map.zoomIn();
document.getElementById("zoomOut").onclick=()=>map.zoomOut();

// ===== 追加(地図タップ → フォーム) =====
let addMode=false, pendingLL=null;
const hint=document.getElementById("hint"), sheet=document.getElementById("sheet");
document.getElementById("btnAdd").onclick=e=>{
  addMode=!addMode; e.target.classList.toggle("on",addMode); hint.classList.toggle("show",addMode);
};
map.on("click",e=>{
  if(!addMode) return;
  pendingLL=e.latlng;
  const now=new Date();
  document.getElementById("fDate").value=now.toISOString().slice(0,10);
  document.getElementById("fTime").value=now.toTimeString().slice(0,5);
  document.getElementById("fPlace").value=""; document.getElementById("fFare").value=""; document.getElementById("fDest").value="";
  sheet.classList.add("open");
});
document.getElementById("btnCancel").onclick=()=>sheet.classList.remove("open");
let formMode="app";
document.getElementById("mApp").onclick=()=>{ formMode="app";
  document.getElementById("mApp").classList.add("on"); document.getElementById("mSt").classList.remove("on"); };
document.getElementById("mSt").onclick=()=>{ formMode="st";
  document.getElementById("mSt").classList.add("on"); document.getElementById("mApp").classList.remove("on"); };
document.getElementById("rideForm").onsubmit=e=>{
  e.preventDefault();
  rides.push({ id:"u"+Date.now(), d:document.getElementById("fDate").value, t:document.getElementById("fTime").value,
    p:document.getElementById("fPlace").value, lat:+pendingLL.lat.toFixed(5), lng:+pendingLL.lng.toFixed(5),
    f:+document.getElementById("fFare").value, dst:document.getElementById("fDest").value, m:formMode, drv:MY_NAME });
  save(); sheet.classList.remove("open");
  addMode=false; document.getElementById("btnAdd").classList.remove("on"); hint.classList.remove("show");
  render();
};

// ===== CSV =====
document.getElementById("btnCsvOut").onclick=()=>{
  const rows=[["date","time","pickup","lat","lng","fare","dropoff","mode","driver"],
    ...rides.map(r=>[r.d,r.t,r.p,r.lat,r.lng,r.f,r.dst||"",r.m||"app",r.drv||""])];
  const csv="\uFEFF"+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="rides.csv"; a.click();
};
// ===== 取り込み共通処理(CSV/タブ区切り、重複は自動スキップ) =====
function importText(text, silent){
  // 改行が失われている場合に備え、日付(YYYY-MM-DD)の直前で強制的に区切る
  const norm = text.replace(/^\uFEFF/,"")
    .replace(/\s+(?="?\d{4}-\d{2}-\d{2}"?[,\t])/g,"\n");
  const lines = norm.split(/\r?\n/).map(l=>l.trim()).filter(Boolean)
    .filter(l=>/^"?\d{4}-\d{2}-\d{2}"?[,\t]/.test(l)); // 記録行(日付始まり、引用符付きも可)のみ対象
  let added=0, dup=0, bad=0;
  lines.forEach(line=>{
    let c;
    if(line.includes("\t")){
      c=line.split("\t").map(x=>x.trim());
    }else{
      c=line.match(/("([^"]|"")*"|[^,]*)/g).filter(x=>x!=="").map(x=>x.replace(/^"|"$/g,"").replace(/""/g,'"'));
    }
    if(c.length>=6 && !isNaN(+c[3]) && !isNaN(+c[4]) && !isNaN(+c[5].replace(/[,¥\s]/g,""))){
      const rec={ d:c[0], t:c[1], p:c[2], lat:+c[3], lng:+c[4], f:+c[5].replace(/[,¥\s]/g,""),
        dst:c[6]||"", m:(c[7]==="st"||c[7]==="流し")?"st":"app", drv:(c[8]||"").trim() };
      const exists=rides.some(r=>r.d===rec.d && r.t===rec.t && r.f===rec.f && r.lat===rec.lat && r.lng===rec.lng);
      if(exists){ dup++; return; }
      rides.push({id:"i"+Date.now()+Math.random(), ...rec});
      added++;
    }else{ bad++; }
  });
  save(); render();
  if(silent){
    if(added>0){ // 共有データ取り込み時は控えめに通知
      const h=document.getElementById("hint");
      h.textContent="共有データから"+added+"件を追加しました";
      h.classList.add("show");
      setTimeout(()=>{ h.classList.remove("show"); h.textContent="地図をタップして乗車地点を選択"; }, 3500);
    }
  }else{
    let msg=added+"件を読み込みました";
    if(dup) msg+="\n(重複のため"+dup+"件をスキップ)";
    if(bad) msg+="\n(形式エラーで"+bad+"件をスキップ)";
    alert(msg);
  }
  return added;
}

// ===== 共有データの自動読み込み(アプリと同じ場所のrides.csvを起動時に取得) =====
function loadShared(silent){
  return fetch("rides.csv?v="+Date.now(),{cache:"no-store"})
    .then(r=>{
      if(!r.ok) throw new Error("rides.csvが見つかりません(HTTP "+r.status+")");
      return r.text();
    })
    .then(t=>importText(t, silent))
    .catch(err=>{
      if(!silent) alert("共有データを読み込めませんでした。\n"+err.message+"\n(ネット接続と、rides.csvがindex.htmlと同じ場所にあるかを確認してください)");
    });
}
loadShared(true); // 起動時は静かに実行
document.getElementById("btnSync").onclick=()=>loadShared(false); // 手動時は結果を表示

document.getElementById("btnCsvIn").onclick=()=>document.getElementById("fileCsv").click();
document.getElementById("fileCsv").onchange=e=>{
  const file=e.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>importText(rd.result);
  rd.readAsText(file); e.target.value="";
};

// ===== 貼り付け読み込み =====
const pasteSheet=document.getElementById("pasteSheet");
document.getElementById("btnPaste").onclick=()=>{
  document.getElementById("pasteText").value="";
  pasteSheet.classList.add("open");
};
document.getElementById("btnPasteCancel").onclick=()=>pasteSheet.classList.remove("open");
document.getElementById("pasteForm").onsubmit=e=>{
  e.preventDefault();
  const text=document.getElementById("pasteText").value;
  if(text.trim()) importText(text);
  pasteSheet.classList.remove("open");
};

// ===== 初期化 =====
document.getElementById("btnReset").onclick=()=>{
  if(confirm("追加した記録を含む全データを消去し、7/9の初期データに戻します。よろしいですか?")){
    localStorage.removeItem(KEY); rides=load(); render();
  }
};

// ===== フィルターパネルの開閉 =====
const panel=document.getElementById("panel"), handleText=document.getElementById("handleText");
function setPanel(collapsed){
  panel.classList.toggle("collapsed", collapsed);
  handleText.textContent = collapsed ? "フィルターを開く ▲" : "フィルターを閉じる ▼";
  localStorage.setItem("taxi-map-panel", collapsed ? "1" : "0");
  setTimeout(()=>map.invalidateSize(), 280); // 地図の表示領域を再計算
}
const handle=document.getElementById("panelHandle");
let tsY=null, flicked=false;
handle.addEventListener("touchstart", e=>{ tsY=e.touches[0].clientY; flicked=false; },{passive:true});
handle.addEventListener("touchmove", e=>{
  if(tsY===null) return;
  const dy=e.touches[0].clientY - tsY;
  if(Math.abs(dy)>20){ setPanel(dy>0); flicked=true; tsY=null; } // 下=閉じる / 上=開く
},{passive:true});
handle.addEventListener("touchend", ()=>{ tsY=null; },{passive:true});
handle.onclick=()=>{ if(flicked){ flicked=false; return; } setPanel(!panel.classList.contains("collapsed")); };
if(localStorage.getItem("taxi-map-panel")==="1") setPanel(true);

// ===== 起動時の初期状態(現在地ON・ヒートON・時間帯=今) =====
(function initDefaults(){
  document.getElementById("btnHeat").classList.add("on");
  const h=new Date().getHours();
  const sh=h<5?h+24:h;
  elMin.value=Math.max(5, sh-1); elMax.value=Math.min(29, sh+2);
  tMin=+elMin.value; tMax=+elMax.value;
  const fill=document.getElementById("tlFill");
  fill.style.left=((tMin-5)/24*100)+"%";
  fill.style.width=((tMax-tMin)/24*100)+"%";
  document.getElementById("tlVal").textContent=fmtH(tMin)+" – "+fmtH(tMax);
  gpsSilent=true; btnGps.onclick(); // 現在地追尾を自動開始
})();
render();
</script>
